<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi Wajah (Firestore)</title>
    <link rel="stylesheet" href="assets/css/absen.css">
</head>
<body>

    <div class="container">
        <h2>Daftar Wajah</h2>
        
        <input type="text" id="namaUser" placeholder="Masukkan Nama Lengkap" required>
        <input type="text" id="idUser" placeholder="Masukkan NIS / ID" required>

        <video autoplay playsinline id="videoElement"></video>
        <img id="previewImage" alt="Preview Wajah">
        <canvas id="canvasElement"></canvas>

        <button id="btnStartCamera">Buka Kamera</button>
        <button id="btnCapture">Scan Wajah</button>
        
        <button id="btnConfirm">Confirm & Simpan ke Firestore</button>
        <button id="btnRetake">Ulangi Foto</button>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js" type="module" src="assets/js/absen.js"></script>
</body>
</html>
