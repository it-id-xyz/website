<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/qrcode.css">
    <link rel="icon" sizes="192x192" href="assets/img/it.png">
    <title>QR Code Generator - Simple & Fast</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <h2>QR Generator</h2>
        <input type="text" id="text-input" placeholder="Masukkan teks atau URL...">
        <input type="text" id="nama-input" placeholder="Masukkan nama">
        <button onclick="generateQR()">Generate QR</button>
        
        <div id="qrcode"></div>
        
        <a id="download-btn" href="#">Download PNG</a>
    </div>

    <script src="assets/js/qrcode.js"></script>
</body>
</html>
